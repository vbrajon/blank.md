<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blank.md</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Azeret+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== THEME ===== */
:root {
  --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-mono: 'Azeret Mono', 'SF Mono', monospace;
  --bg: #fff0f5;
  --surface: #ffffff;
  --surface2: #ffe4ef;
  --border: rgba(200,50,100,0.1);
  --border-bright: rgba(200,50,100,0.2);
  --text: #3d1a2e;
  --text-dim: #a06080;
  --accent: #e8368f;
  --accent-dim: rgba(232,54,143,0.1);
  --code-bg: #2d1525;
  --code-text: #ffe4ef;
  --green: #4ebb6a; --green-dim: rgba(78,187,106,0.1);
  --teal: #14b8a6; --teal-dim: rgba(20,184,166,0.1);
  --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.1);
  --blue: #8b5cf6; --blue-dim: rgba(139,92,246,0.1);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1f0a18; --surface: #2a1222; --surface2: #361a2e;
    --border: rgba(255,150,200,0.1); --border-bright: rgba(255,150,200,0.2);
    --text: #fce4ec; --text-dim: #c48da8;
    --accent: #f472b6; --accent-dim: rgba(244,114,182,0.12);
    --code-bg: #150812; --code-text: #fce4ec;
    --green: #6ee7b7; --green-dim: rgba(110,231,183,0.1);
    --teal: #5eead4; --teal-dim: rgba(94,234,212,0.1);
    --amber: #fcd34d; --amber-dim: rgba(252,211,77,0.1);
    --blue: #c084fc; --blue-dim: rgba(192,132,252,0.1);
  }
}

/* ===== RESET ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font-body); font-size: 18px; color: var(--text); background: var(--bg); }

/* ===== DECK ===== */
.deck {
  height: 100dvh; overflow-y: auto;
  scroll-snap-type: y mandatory;
}
.slide {
  height: 100dvh; scroll-snap-align: start; overflow: hidden;
  position: relative; display: flex; flex-direction: column; justify-content: center;
  padding: clamp(40px,6vh,80px) clamp(40px,8vw,120px);
  opacity: 0; transform: translateY(12px);
  transition: opacity 0.12s ease-out, transform 0.12s ease-out;
}
.slide.visible { opacity: 1; transform: none; }
.slide .reveal {
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.1s ease-out, transform 0.1s ease-out;
}
.slide.visible .reveal { opacity: 1; transform: none; }
.slide.visible .reveal:nth-child(1) { transition-delay: 0.02s; }
.slide.visible .reveal:nth-child(2) { transition-delay: 0.04s; }
.slide.visible .reveal:nth-child(3) { transition-delay: 0.06s; }
.slide.visible .reveal:nth-child(4) { transition-delay: 0.08s; }
.slide.visible .reveal:nth-child(5) { transition-delay: 0.10s; }
.slide.visible .reveal:nth-child(6) { transition-delay: 0.12s; }
.slide.visible .reveal:nth-child(7) { transition-delay: 0.14s; }
.slide.visible .reveal:nth-child(8) { transition-delay: 0.16s; }
@media (prefers-reduced-motion: reduce) {
  .slide, .slide .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
}

/* ===== NAV CHROME ===== */
.deck-progress {
  position: fixed; top: 0; left: 0; height: 3px;
  background: var(--accent); z-index: 100;
  transition: width 0.3s ease; pointer-events: none;
}
.deck-dots {
  position: fixed; right: clamp(12px,2vw,24px); top: 50%;
  transform: translateY(-50%); display: flex; flex-direction: column;
  gap: 8px; z-index: 100; padding: 8px;
  background: color-mix(in srgb, var(--bg) 60%, transparent 40%);
  border-radius: 20px; backdrop-filter: blur(4px);
}
.deck-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-dim); opacity: 0.3; border: none; padding: 0;
  cursor: pointer; transition: opacity 0.2s, transform 0.2s;
}
.deck-dot:hover { opacity: 0.6; }
.deck-dot.active { opacity: 1; transform: scale(1.5); background: var(--accent); }
.deck-counter {
  position: fixed; bottom: clamp(12px,2vh,24px); right: clamp(12px,2vw,24px);
  font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);
  z-index: 100; font-variant-numeric: tabular-nums;
}

/* ===== SLIDE LAYOUTS ===== */
.slide.layout-cover {
  justify-content: center; align-items: center; text-align: center;
  background-image:
    radial-gradient(ellipse at 50% 60%, var(--accent-dim) 0%, transparent 50%),
    radial-gradient(circle at 20% 80%, var(--teal-dim) 0%, transparent 30%),
    radial-gradient(circle at 80% 20%, var(--blue-dim) 0%, transparent 30%);
}
.slide.layout-cover h1 { color: var(--accent); font-size: clamp(56px,12vw,112px); font-weight: 800; letter-spacing: -4px; line-height: 0.9; }
.slide.layout-cover p { color: var(--text-dim); font-size: clamp(16px,2vw,24px); margin-top: 12px; }
.slide.layout-cover strong { color: var(--text); font-size: clamp(18px,2.2vw,28px); display: block; margin-top: 4px; }
.slide.layout-cover::after {
  content: ''; position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  width: 24px; height: 24px; border-right: 2px solid var(--text-dim); border-bottom: 2px solid var(--text-dim);
  transform: translateX(-50%) rotate(45deg); opacity: 0.3;
  animation: cover-bounce 1.5s ease-in-out infinite;
}
@keyframes cover-bounce { 0%,100% { bottom: 32px; } 50% { bottom: 24px; } }

.slide.layout-section {
  justify-content: center;
  background-image: radial-gradient(ellipse at 80% 60%, var(--accent-dim) 0%, transparent 40%);
}
.slide.layout-section h2 { font-size: clamp(28px,5vw,48px); font-weight: 700; letter-spacing: -1px; }
.slide.layout-section p { color: var(--text-dim); font-family: var(--font-mono); font-size: clamp(12px,1.4vw,16px); letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; }

.slide.layout-default { justify-content: flex-start; padding-top: clamp(36px,6vh,72px); }

.slide.layout-two-cols .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: center; flex: 1; }
.slide.layout-two-cols .col { min-width: 0; }

.slide.layout-center { justify-content: center; align-items: center; text-align: center; }
.slide.layout-center pre { text-align: left; }

.slide.layout-quote {
  justify-content: center; align-items: center; text-align: center;
  padding: 64px 80px;
  background-image: radial-gradient(ellipse at 50% 50%, var(--accent-dim) 0%, transparent 35%);
}
.slide.layout-quote .quote-mark {
  font-size: clamp(80px,14vw,160px); line-height: 0.5; opacity: 0.06;
  font-family: Georgia, serif; color: var(--accent); margin-bottom: -16px;
}
.slide.layout-quote blockquote {
  font-size: clamp(22px,3.5vw,40px); font-weight: 400; line-height: 1.35;
  font-style: italic; border: none; padding: 0; margin: 0; background: none;
}
.slide.layout-quote cite {
  font-family: var(--font-mono); font-size: clamp(11px,1.3vw,14px);
  font-style: normal; margin-top: 24px; display: block;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim);
}

.slide.layout-end {
  justify-content: flex-end; padding: 0;
  background: linear-gradient(135deg, #9b1b5e 0%, #4a1040 40%, #1f0a18 100%); color: #fff;
}
.slide.layout-end::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.15) 40%, transparent 100%);
}
.slide.layout-end > * { position: relative; z-index: 1; }
.slide.layout-end .end-content { padding: 48px 64px; }
.slide.layout-end h1 { color: #fff; font-size: clamp(32px,6vw,64px); font-weight: 700; letter-spacing: -1px; }
.slide.layout-end p { color: rgba(255,255,255,0.6); font-family: var(--font-mono); font-size: clamp(11px,1.3vw,14px); letter-spacing: 1px; margin-top: 12px; }

/* ===== MARKDOWN ELEMENTS ===== */
.slide h1 { font-size: clamp(32px,5vw,56px); font-weight: 800; letter-spacing: -2px; line-height: 1.05; margin-bottom: 12px; }
.slide h2 { font-size: clamp(24px,3.5vw,40px); font-weight: 700; letter-spacing: -1px; line-height: 1.15; margin-bottom: 10px; }
.slide h3 { font-size: clamp(18px,2.5vw,28px); font-weight: 600; letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 8px; }
.slide p { font-size: clamp(16px,1.8vw,22px); line-height: 1.6; color: var(--text-dim); margin-bottom: 6px; }
.slide ul, .slide ol { list-style: none; padding: 0; margin: 8px 0; }
.slide li {
  padding: 6px 0 6px 20px; position: relative;
  font-size: clamp(16px,1.8vw,22px); line-height: 1.5; color: var(--text-dim);
}
.slide li::before {
  content: ''; position: absolute; left: 0; top: 1em;
  width: 5px; height: 5px; border-radius: 1px; background: var(--accent);
}
.slide code {
  font-family: var(--font-mono); font-size: 0.85em;
  background: var(--accent-dim); color: var(--accent);
  padding: 1px 5px; border-radius: 3px;
}
.slide pre {
  background: var(--code-bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px 24px;
  margin: 12px 0; max-width: 800px; width: 100%; overflow-x: auto;
}
.slide pre code {
  background: none; color: var(--code-text); padding: 0;
  font-size: clamp(12px,1.3vw,15px); line-height: 1.7; display: block;
}
.slide pre.shiki { background: inherit; }
.slide pre.shiki code { color: inherit; }
.slide blockquote {
  border-left: 3px solid var(--accent); padding: 8px 16px;
  margin: 12px 0; background: var(--accent-dim); border-radius: 0 6px 6px 0;
}
.slide blockquote p { color: var(--text); }
.slide strong { color: var(--text); font-weight: 600; }
.slide a { color: var(--accent); }
.slide img { max-width: 100%; border-radius: 8px; }

.slide .md-table { width: 100%; border-collapse: collapse; margin: 12px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.slide .md-table th { background: var(--surface2); font-family: var(--font-mono); font-size: clamp(10px,1.2vw,13px); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); text-align: left; padding: 10px 16px; border-bottom: 2px solid var(--border-bright); }
.slide .md-table td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: clamp(13px,1.5vw,16px); vertical-align: top; }
.slide .md-table tr:last-child td { border-bottom: none; }
.slide .md-table tr:nth-child(even) { background: var(--accent-dim); }

/* ===== CUSTOM COMPONENTS ===== */
.label { font-family: var(--font-mono); font-size: clamp(10px,1.1vw,12px); font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 8px; display: block; }
.section-number { font-size: clamp(100px,22vw,260px); font-weight: 200; line-height: 0.85; opacity: 0.06; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-55%); pointer-events: none; color: var(--accent); }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 12px; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 14px; }
.kpi-val { font-size: clamp(28px,5vw,52px); font-weight: 800; letter-spacing: -1px; line-height: 1.1; }
.kpi-label { font-family: var(--font-mono); font-size: clamp(9px,1vw,11px); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-top: 4px; }
.kpi-detail { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.pipeline { display: flex; align-items: stretch; gap: 0; margin-top: 12px; flex: 1; }
.step { flex: 1; background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--accent); border-radius: 8px; padding: 12px 10px; display: flex; flex-direction: column; }
.step-num { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: 1px; }
.step-name { font-size: clamp(14px,1.8vw,20px); font-weight: 700; margin: 4px 0; }
.step-desc { font-size: clamp(11px,1.2vw,14px); color: var(--text-dim); line-height: 1.4; }
.step-desc code { font-size: 0.85em; }
.arrow { display: flex; align-items: center; padding: 0 4px; color: var(--accent); opacity: 0.4; font-size: 18px; }
.func-chip { font-family: var(--font-mono); font-size: clamp(11px,1.2vw,14px); padding: 5px 10px; border-radius: 5px; background: var(--surface); border: 1px solid var(--border); }

/* ===== EDITOR OVERLAY ===== */
.editor-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  background: #1e1e1e;
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.editor-overlay.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }
.editor-toolbar {
  display: flex; align-items: center; gap: 8px;
  height: 40px; padding: 0 12px;
  background: #252526; border-bottom: 1px solid #3c3c3c;
  flex-shrink: 0;
}
.editor-title { font-family: var(--font-mono); font-size: 13px; color: #858585; }
.editor-toolbar .spacer { flex: 1; }
.editor-btn {
  background: none; border: 1px solid #3c3c3c; color: #cccccc;
  padding: 4px 12px; border-radius: 4px; cursor: pointer;
  font-family: var(--font-mono); font-size: 12px; transition: all 0.15s;
}
.editor-btn:hover { background: rgba(255,255,255,0.1); }
.editor-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.editor-btn.primary:hover { opacity: 0.9; }

.editor-wrap { flex: 1; position: relative; overflow: hidden; }
.editor-wrap textarea,
.editor-wrap .editor-highlight {
  position: absolute; inset: 0;
  font-family: var(--font-mono); font-size: 14px; line-height: 1.7;
  padding: 16px; tab-size: 2;
  white-space: pre-wrap; word-wrap: break-word;
  border: none; outline: none; resize: none;
}
.editor-wrap textarea {
  color: transparent; background: transparent;
  caret-color: #d4d4d4; z-index: 1;
  -webkit-text-fill-color: transparent;
  overflow-y: auto;
}
.editor-wrap .editor-highlight {
  z-index: 0; color: #d4d4d4; background: #1e1e1e;
  pointer-events: none; overflow: hidden;
}

/* Editor syntax colors */
.ed-h { color: #f472b6; font-weight: 700; }
.ed-sep { color: #6b3a5a; }
.ed-fm { color: #c084fc; }
.ed-code { color: #6ee7b7; }
.ed-bold { color: #fce4ec; font-weight: 700; }
.ed-inline-code { color: #fcd34d; }
.ed-bullet { color: #f472b6; }
.ed-blockquote { color: #c48da8; }
.ed-slot { color: #5eead4; font-weight: 600; }
.ed-html { color: #a06080; }

/* ===== EDIT TOOLBAR ===== */
.deck-toolbar {
  position: fixed; top: 0; right: 0; z-index: 150;
  padding: 8px 12px;
}
.deck-toolbar.hidden { display: none; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .slide.layout-two-cols .cols { grid-template-columns: 1fr; }
  .pipeline { flex-direction: column; }
  .arrow { justify-content: center; transform: rotate(90deg); }
  .deck-dots { display: none; }
}

/* ===== COLLABORATION ===== */
.cursor-overlay {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 2;
  overflow: hidden;
}
.remote-cursor {
  position: absolute; width: 2px;
  pointer-events: none;
  border-radius: 1px;
}
.remote-cursor-label {
  position: absolute; top: -18px; left: -1px;
  color: #fff; font-size: 10px;
  padding: 1px 6px; border-radius: 3px 3px 3px 0;
  white-space: nowrap;
  font-family: var(--font-mono);
  font-weight: 600; line-height: 14px;
}
.collab-users {
  display: flex; align-items: center; gap: 4px;
  margin-right: 8px;
}
.collab-dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.3);
  flex-shrink: 0;
}
.collab-count {
  font-family: var(--font-mono); font-size: 11px;
  color: #858585; margin-left: 2px;
}
.remote-pointer {
  position: fixed; pointer-events: none; z-index: 9999;
  transition: left 0.08s linear, top 0.08s linear;
}
.remote-pointer svg {
  width: 16px; height: 20px;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
}
.remote-pointer-label {
  position: absolute; top: 16px; left: 10px;
  color: #fff; font-size: 10px;
  padding: 1px 6px; border-radius: 3px;
  white-space: nowrap;
  font-family: var(--font-mono);
  font-weight: 600; line-height: 14px;
  opacity: 0.9;
}
</style>
</head>
<body>

<!-- Editor overlay -->
<div id="editor-overlay" class="editor-overlay hidden">
  <div class="editor-toolbar">
    <span class="editor-title">ai.md</span>
    <div class="collab-users" id="collab-users"></div>
    <div class="spacer"></div>
    <button id="btn-done" class="editor-btn primary">View ▶</button>
  </div>
  <div class="editor-wrap">
    <div class="editor-highlight" id="editor-highlight"></div>
    <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    <div class="cursor-overlay" id="cursor-overlay"></div>
  </div>
</div>

<!-- Remote mouse pointers -->
<div id="remote-pointers"></div>

<!-- Slide deck -->
<div class="deck" id="deck"></div>

<!-- Edit toolbar -->
<div id="deck-toolbar" class="deck-toolbar">
  <button id="btn-edit" class="editor-btn primary" title="Edit slides (e)">Edit ✎</button>
</div>

<script type="module">
// ===== STATE =====
const deck = document.getElementById('deck')
const editorOverlay = document.getElementById('editor-overlay')
const editorEl = document.getElementById('editor')
const editorHighlight = document.getElementById('editor-highlight')
const editBtn = document.getElementById('btn-edit')
const doneBtn = document.getElementById('btn-done')
let slides = [], currentSlide = 0, observer = null
let progressBar, dots = [], counter
let shikiHighlighter = null
let ydoc = null, ytext = null, provider = null, awareness = null
let knownValue = ''
let collabReady = false

const deckToolbar = document.getElementById('deck-toolbar')

// ===== MARKDOWN PARSER =====
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
}

const { marked } = await import('https://esm.sh/marked@15')
marked.setOptions({ gfm: true, breaks: false })
marked.use({ renderer: {
  code({ text, lang }) {
    const language = (lang || 'text').split(/\s/)[0]
    return '<pre class="code-block" data-lang="' + language + '"><code>' + escapeHtml(text) + '</code></pre>'
  },
  table({ header, rows }) {
    let html = '<table class="md-table"><thead><tr>'
    for (const cell of header) html += '<th>' + cell.text + '</th>'
    html += '</tr></thead><tbody>'
    for (const row of rows) {
      html += '<tr>'
      for (const cell of row) html += '<td>' + cell.text + '</td>'
      html += '</tr>'
    }
    return html + '</tbody></table>'
  }
}})

function renderMarkdown(md) {
  if (!md) return ''
  return marked.parse(md)
}

// ===== INIT =====
async function init() {
  const saved = localStorage.getItem('slidev-md')
  if (saved) {
    editorEl.value = saved
  } else {
    const res = await fetch('ai.md')
    editorEl.value = (await res.text()).trim()
  }
  const hashSlide = parseInt(location.hash.slice(1)) - 1
  buildDeck()
  buildChrome()
  bindEvents()
  loadShiki()
  setupCollaboration()
  if (hashSlide > 0) requestAnimationFrame(() => goTo(hashSlide))
}
init()

function parseYAML(text) {
  const obj = {}
  for (const line of text.split('\n')) {
    const idx = line.indexOf(':')
    if (idx > 0) obj[line.slice(0, idx).trim()] = line.slice(idx + 1).trim()
  }
  return obj
}

function splitSlides(text) {
  const lines = text.split('\n')
  const sections = [[]]
  let inCode = false
  for (const line of lines) {
    if (line.trimStart().startsWith('```')) inCode = !inCode
    if (!inCode && /^\s*---\s*$/.test(line)) {
      sections.push([])
    } else {
      sections[sections.length - 1].push(line)
    }
  }
  return sections.map(s => s.join('\n').trim()).filter(Boolean)
}

function parseSlidesAuto(text) {
  const lines = text.split('\n')
  const slides = []
  let current = null
  let inCode = false

  function flush() {
    if (current && current.lines.length) {
      current.content = current.lines.join('\n').trim()
      delete current.lines
      if (current.content) slides.push(current)
    }
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i]
    if (line.trimStart().startsWith('```')) inCode = !inCode
    if (inCode) { if (current) current.lines.push(line); continue }

    // # H1 → cover or end
    if (/^# /.test(line)) {
      flush()
      current = { layout: 'cover', lines: [line] }
      // Collect following non-heading lines as part of this slide
      while (i + 1 < lines.length && !/^#{1,2} /.test(lines[i + 1]) && !/^\d+\.\s/.test(lines[i + 1])) {
        i++
        if (lines[i].trimStart().startsWith('```')) inCode = !inCode
        current.lines.push(lines[i])
      }
      continue
    }

    // ## H2 → section
    if (/^## /.test(line)) {
      flush()
      current = { layout: 'section', lines: [line] }
      // Collect subtitle lines (non-empty, non-heading, non-numbered, no bullets, no code)
      while (i + 1 < lines.length) {
        const next = lines[i + 1]
        if (/^#{1,2} /.test(next) || /^\d+\.\s/.test(next) || /^- /.test(next) || /^```/.test(next) || /^\|/.test(next)) break
        if (next.trim() === '' && i + 2 < lines.length && (/^#{1,2} /.test(lines[i + 2]) || /^\d+\.\s/.test(lines[i + 2]) || /^- /.test(lines[i + 2]) || /^```/.test(lines[i + 2]))) break
        i++
        current.lines.push(lines[i])
      }
      continue
    }

    // N. title → new content slide (convert "1. title" to "### title")
    if (/^\d+\.\s/.test(line)) {
      flush()
      const heading = line.replace(/^\d+\.\s+/, '### ')
      current = { layout: 'default', lines: [heading] }
      continue
    }

    // Anything else → append to current slide, or start a new default slide
    if (!current) current = { layout: 'default', lines: [] }
    current.lines.push(line)
  }
  flush()

  // Post-process: detect layouts
  if (slides.length > 0 && slides[slides.length - 1].layout === 'cover') {
    slides[slides.length - 1].layout = 'end'
  }
  let sectionIdx = 0
  for (const s of slides) {
    const c = s.content
    // Center layout: only a code block (with optional heading)
    if (/^(###?\s.+\n\n)?```[\s\S]*```\s*$/.test(c)) s.layout = s.layout === 'default' ? 'center' : s.layout
    // Quote layout
    if (/^>\s/.test(c) && !c.includes('\n- ')) s.layout = 'quote'
    // Section numbering: sections with only a heading (no bullets, code, or long content)
    if (s.layout === 'section') {
      const lines = c.split('\n').filter(l => l.trim())
      const headingOnly = lines.every(l => /^##?\s/.test(l) || l.trim().length < 60)
      if (headingOnly) {
        sectionIdx++
        const num = String(sectionIdx).padStart(2, '0')
        s.content = '<span class="section-number">' + num + '</span>\n\n' + c
      }
    }
    // Section with two bullet groups → split into section heading + two-cols slide
    if (s.layout === 'section') {
      const parts = c.split(/\n\n+/).filter(p => p.trim())
      const headings = parts.filter(p => /^##?\s/.test(p))
      const bulletGroups = parts.filter(p => p.split('\n').every(l => /^[-*+] /.test(l.trim()) || !l.trim()))
      if (headings.length >= 1 && bulletGroups.length === 2) {
        s.content = headings.join('\n')
        // Re-evaluate section numbering for this now heading-only section
        const sLines = s.content.split('\n').filter(l => l.trim())
        if (sLines.every(l => /^##?\s/.test(l) || l.trim().length < 60)) {
          sectionIdx++
          s.content = '<span class="section-number">' + String(sectionIdx).padStart(2, '0') + '</span>\n\n' + s.content
        }
        // Insert a two-cols slide right after
        const twoColSlide = {
          layout: 'two-cols',
          content: '::left::\n' + bulletGroups[0].trim() + '\n::right::\n' + bulletGroups[1].trim()
        }
        slides.splice(slides.indexOf(s) + 1, 0, twoColSlide)
      }
    }
  }

  return slides
}

function parseSlides(text) {
  text = text.trim()
  // Auto-detect mode: if text contains --- separators outside code fences, use slidev mode
  let hasSeparators = false
  let inCode = false
  for (const line of text.split('\n')) {
    if (line.trimStart().startsWith('```')) inCode = !inCode
    if (!inCode && /^\s*---\s*$/.test(line)) { hasSeparators = true; break }
  }

  if (hasSeparators) {
    // Slidev mode (existing logic)
    const sections = splitSlides(text)
    const result = []
    let i = 0
    while (i < sections.length) {
      const section = sections[i]
      const sectionLines = section.split('\n').map(l => l.trim()).filter(Boolean)
      const isFM = sectionLines.length > 0 && sectionLines.every(l => /^[a-zA-Z_][\w-]*\s*:/.test(l))
      if (isFM && i + 1 < sections.length) {
        const fm = parseYAML(section)
        i++
        result.push({ ...fm, content: sections[i] })
      } else {
        result.push({ content: section })
      }
      i++
    }
    return result
  }

  // Auto mode
  return parseSlidesAuto(text)
}



// ===== SLIDE RENDERER =====
function renderSlide(slide) {
  const layout = slide.layout || 'default'
  let content = slide.content || ''

  if (layout === 'two-cols') {
    const beforeCols = content.match(/^([\s\S]*?)(?=::(?:left|right)::)/)?.[1]?.trim() || ''
    const leftMatch = content.match(/::left::([\s\S]*?)(?=::right::|$)/)
    const rightMatch = content.match(/::right::([\s\S]*?)(?=::left::|$)/)
    const left = leftMatch ? leftMatch[1].trim() : ''
    const right = rightMatch ? rightMatch[1].trim() : ''
    let html = '<section class="slide layout-two-cols">'
    if (beforeCols) html += renderMarkdown(beforeCols)
    html += '<div class="cols">'
    html += '<div class="col">' + renderMarkdown(left) + '</div>'
    html += '<div class="col">' + renderMarkdown(right) + '</div>'
    html += '</div></section>'
    return html
  }

  if (layout === 'quote') {
    const bqMatch = content.match(/>\s*(.+)/s)
    const citeLines = content.split('\n').filter(l => /^[—–\u2014-]\s/.test(l.trim()) && !l.startsWith('>'))
    let html = '<section class="slide layout-quote"><div class="quote-mark">\u201C</div>'
    if (bqMatch) html += '<blockquote>' + marked.parseInline(bqMatch[1].trim()) + '</blockquote>'
    for (const cl of citeLines) {
      const cm = cl.trim().match(/^[—–\u2014-]\s*(.+)/)
      if (cm) html += '<cite>\u2014 ' + marked.parseInline(cm[1]) + '</cite>'
    }
    return html + '</section>'
  }

  if (layout === 'end') {
    return '<section class="slide layout-end"><div class="end-content">' + renderMarkdown(content) + '</div></section>'
  }

  return '<section class="slide layout-' + layout + '">' + renderMarkdown(content) + '</section>'
}

// ===== DECK BUILDER =====
function buildDeck() {
  slides = parseSlides(editorEl.value)
  deck.innerHTML = slides.map(s => renderSlide(s)).join('')
  // Add reveal animations to direct children
  deck.querySelectorAll('.slide').forEach(slide => {
    Array.from(slide.children).forEach(child => {
      if (!child.classList.contains('cols') && !child.classList.contains('end-content')) {
        child.classList.add('reveal')
      }
    })
  })
  observeSlides()
  upgradeCodeBlocks()
}

// ===== INTERSECTION OBSERVER =====
function observeSlides() {
  if (observer) observer.disconnect()
  const slideEls = Array.from(deck.querySelectorAll('.slide'))
  observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible')
        currentSlide = slideEls.indexOf(entry.target)
        updateChrome()
      }
    })
  }, { threshold: 0.3 })
  slideEls.forEach(s => observer.observe(s))
}

// ===== NAV CHROME =====
function buildChrome() {
  progressBar = document.createElement('div')
  progressBar.className = 'deck-progress'
  document.body.appendChild(progressBar)

  const dotsContainer = document.createElement('div')
  dotsContainer.className = 'deck-dots'
  dotsContainer.id = 'deck-dots'
  document.body.appendChild(dotsContainer)

  counter = document.createElement('div')
  counter.className = 'deck-counter'
  document.body.appendChild(counter)

  rebuildDots()
  updateChrome()
}

function rebuildDots() {
  const dotsContainer = document.getElementById('deck-dots')
  dotsContainer.innerHTML = ''
  dots = []
  slides.forEach((_, i) => {
    const d = document.createElement('button')
    d.className = 'deck-dot'
    d.title = 'Slide ' + (i + 1)
    d.onclick = () => goTo(i)
    dotsContainer.appendChild(d)
    dots.push(d)
  })
}

function updateChrome() {
  const total = slides.length || 1
  progressBar.style.width = ((currentSlide + 1) / total * 100) + '%'
  dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide))
  counter.textContent = (currentSlide + 1) + ' / ' + slides.length
  history.replaceState(null, '', '#' + (currentSlide + 1))
}

// ===== NAVIGATION =====
function goTo(i) {
  const slideEls = deck.querySelectorAll('.slide')
  const target = slideEls[Math.max(0, Math.min(i, slideEls.length - 1))]
  if (!target) return
  const start = deck.scrollTop, end = target.offsetTop, dist = end - start
  const duration = 200
  let t0 = null
  deck.style.scrollSnapType = 'none'
  function step(ts) {
    if (!t0) t0 = ts
    const p = Math.min((ts - t0) / duration, 1)
    const ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2
    deck.scrollTop = start + dist * ease
    if (p < 1) requestAnimationFrame(step)
    else deck.style.scrollSnapType = ''
  }
  requestAnimationFrame(step)
}
function next() { if (currentSlide < slides.length - 1) goTo(currentSlide + 1) }
function prev() { if (currentSlide > 0) goTo(currentSlide - 1) }

// ===== EDITOR =====
function openEditor() {
  if (ytext && ytext.length > 0) {
    editorEl.value = ytext.toString()
    knownValue = editorEl.value
  }
  editorOverlay.classList.remove('hidden')
  deckToolbar.classList.add('hidden')
  updateEditorHighlight()
  renderRemoteCursors()
  editorEl.focus()
}

function closeEditor() {
  editorOverlay.classList.add('hidden')
  deckToolbar.classList.remove('hidden')
  localStorage.setItem('slidev-md', editorEl.value)
  refreshDeck()
}

function refreshDeck() {
  const prevSlide = currentSlide
  buildDeck()
  rebuildDots()
  updateChrome()
  requestAnimationFrame(() => {
    const slideEls = deck.querySelectorAll('.slide')
    const idx = Math.min(prevSlide, slideEls.length - 1)
    if (slideEls[idx]) slideEls[idx].scrollIntoView({ behavior: 'instant' })
  })
}

function highlightMarkdown(text) {
  const rawLines = text.split('\n')
  const result = []
  let i = 0, afterSep = false
  while (i < rawLines.length) {
    const raw = rawLines[i]
    // Code block: collect and highlight with shiki if available
    const codeMatch = raw.match(/^```(\S*)/)
    if (codeMatch) {
      result.push('<span class="ed-code">' + escapeHtml(raw) + '</span>')
      const lang = codeMatch[1].split(/\s/)[0]
      const codeLines = []
      i++
      while (i < rawLines.length && !rawLines[i].startsWith('```')) {
        codeLines.push(rawLines[i])
        i++
      }
      if (shikiHighlighter && lang) {
        try {
          const tokens = shikiHighlighter.codeToTokens(codeLines.join('\n'), { lang, theme: 'vitesse-dark' })
          for (const tokenLine of tokens.tokens) {
            let lineHtml = ''
            for (const token of tokenLine) {
              lineHtml += '<span style="color:' + (token.color || '#d4d4d4') + '">' + escapeHtml(token.content) + '</span>'
            }
            result.push(lineHtml)
          }
        } catch {
          for (const cl of codeLines) result.push('<span class="ed-code">' + escapeHtml(cl) + '</span>')
        }
      } else {
        for (const cl of codeLines) result.push('<span class="ed-code">' + escapeHtml(cl) + '</span>')
      }
      if (i < rawLines.length) result.push('<span class="ed-code">' + escapeHtml(rawLines[i]) + '</span>')
      afterSep = false
      i++
      continue
    }
    const line = escapeHtml(raw)
    if (/^\s*---\s*$/.test(line)) { afterSep = true; result.push('<span class="ed-sep">' + line + '</span>'); i++; continue }
    if (afterSep && /^[\w-]+\s*:/.test(line)) { result.push('<span class="ed-fm">' + line + '</span>'); i++; continue }
    afterSep = false
    if (/^#{1,6}\s/.test(line)) { result.push('<span class="ed-h">' + line + '</span>'); i++; continue }
    if (/^::[\w-]+::/.test(line)) { result.push('<span class="ed-slot">' + line + '</span>'); i++; continue }
    if (/^&gt;/.test(line)) { result.push('<span class="ed-blockquote">' + line + '</span>'); i++; continue }
    if (/^&lt;/.test(line)) { result.push('<span class="ed-html">' + line + '</span>'); i++; continue }
    result.push(line
      .replace(/(\*\*[^*]+\*\*)/g, '<span class="ed-bold">$1</span>')
      .replace(/(`[^`]+`)/g, '<span class="ed-inline-code">$1</span>')
      .replace(/^([-*+]\s)/, '<span class="ed-bullet">$1</span>'))
    i++
  }
  return result.join('\n')
}

function updateEditorHighlight() {
  editorHighlight.innerHTML = highlightMarkdown(editorEl.value) + '\n'
}

// ===== SHIKI =====
async function loadShiki() {
  try {
    const m = await import('https://esm.sh/shiki@1.29.2/bundle/web')
    shikiHighlighter = await m.createHighlighter({
      themes: ['vitesse-dark'],
      langs: ['javascript', 'typescript', 'json', 'bash', 'html', 'css', 'python', 'yaml', 'markdown']
    })
    upgradeCodeBlocks()
    updateEditorHighlight()
  } catch (e) {
    console.debug('[slidev] Shiki not loaded:', e.message)
  }
}

function upgradeCodeBlocks() {
  if (!shikiHighlighter) return
  deck.querySelectorAll('.code-block[data-lang]').forEach(pre => {
    const code = pre.querySelector('code')
    if (!code) return
    const raw = code.textContent
    const lang = pre.dataset.lang || 'javascript'
    try {
      const html = shikiHighlighter.codeToHtml(raw, { lang, theme: 'vitesse-dark' })
      const tmp = document.createElement('div')
      tmp.innerHTML = html
      const shikiPre = tmp.querySelector('pre')
      if (shikiPre) {
        pre.style.backgroundColor = shikiPre.style.backgroundColor || ''
        pre.classList.add('shiki')
        code.innerHTML = shikiPre.querySelector('code').innerHTML
      }
    } catch (e) { /* lang not loaded */ }
  })
}

// ===== COLLABORATION (Yjs + WebRTC) =====
function syncToYText() {
  if (!ytext || !ydoc || !collabReady) return
  const newVal = editorEl.value
  if (newVal === knownValue) return
  let start = 0
  while (start < knownValue.length && start < newVal.length && knownValue[start] === newVal[start]) start++
  let endOld = knownValue.length, endNew = newVal.length
  while (endOld > start && endNew > start && knownValue[endOld - 1] === newVal[endNew - 1]) { endOld--; endNew-- }
  ydoc.transact(() => {
    if (endOld - start > 0) ytext.delete(start, endOld - start)
    if (endNew > start) ytext.insert(start, newVal.slice(start, endNew))
  })
  knownValue = newVal
}

function getCaretCoords(element, position) {
  const div = document.createElement('div')
  const cs = getComputedStyle(element)
  const props = ['fontFamily','fontSize','fontWeight','lineHeight','letterSpacing',
    'wordSpacing','textIndent','whiteSpace','wordWrap','overflowWrap','tabSize',
    'paddingTop','paddingRight','paddingBottom','paddingLeft',
    'borderTopWidth','borderRightWidth','borderBottomWidth','borderLeftWidth']
  props.forEach(p => div.style[p] = cs[p])
  div.style.position = 'absolute'
  div.style.visibility = 'hidden'
  div.style.whiteSpace = 'pre-wrap'
  div.style.wordWrap = 'break-word'
  div.style.width = element.clientWidth + 'px'
  div.style.overflow = 'hidden'
  div.textContent = element.value.substring(0, position)
  const marker = document.createElement('span')
  marker.textContent = '\u200b'
  div.appendChild(marker)
  document.body.appendChild(div)
  const coords = {
    top: marker.offsetTop,
    left: marker.offsetLeft,
    height: parseFloat(cs.lineHeight) || parseFloat(cs.fontSize) * 1.7
  }
  document.body.removeChild(div)
  return coords
}

function renderRemoteCursors() {
  const overlay = document.getElementById('cursor-overlay')
  if (!overlay || !awareness) return
  if (editorOverlay.classList.contains('hidden')) { overlay.innerHTML = ''; return }
  const states = awareness.getStates()
  const localId = awareness.clientID
  let html = ''
  for (const [id, state] of states) {
    if (id === localId || !state.user || !state.cursor) continue
    const { name, color } = state.user
    const pos = Math.min(state.cursor.head, editorEl.value.length)
    const coords = getCaretCoords(editorEl, pos)
    const top = coords.top - editorEl.scrollTop
    html += '<div class="remote-cursor" style="left:' + coords.left + 'px;top:' + top + 'px;height:' + coords.height + 'px;background:' + color + '">' +
      '<div class="remote-cursor-label" style="background:' + color + '">' + escapeHtml(name) + '</div></div>'
  }
  overlay.innerHTML = html
}

function renderRemotePointers() {
  const container = document.getElementById('remote-pointers')
  if (!container || !awareness) return
  const states = awareness.getStates()
  const localId = awareness.clientID
  let html = ''
  for (const [id, state] of states) {
    if (id === localId || !state.user || !state.pointer) continue
    const { name, color } = state.user
    const { x, y } = state.pointer
    html += '<div class="remote-pointer" style="left:' + x + 'px;top:' + y + 'px">' +
      '<svg viewBox="0 0 16 20"><path d="M0 0 L0 16 L4.5 12 L8.5 19.5 L11 18.5 L7 11 L12 11 Z" fill="' + color + '" stroke="#fff" stroke-width="1"/></svg>' +
      '<div class="remote-pointer-label" style="background:' + color + '">' + escapeHtml(name) + '</div></div>'
  }
  container.innerHTML = html
}

function renderCollabUsers() {
  const container = document.getElementById('collab-users')
  if (!container || !awareness) return
  const states = awareness.getStates()
  let html = ''
  for (const [, state] of states) {
    if (!state.user) continue
    html += '<span class="collab-dot" style="background:' + state.user.color + '" title="' + escapeHtml(state.user.name) + '"></span>'
  }
  if (states.size > 1) html += '<span class="collab-count">' + states.size + '</span>'
  container.innerHTML = html
}

async function setupCollaboration() {
  try {
    const Y = await import('https://esm.sh/yjs@13')
    const { WebrtcProvider } = await import('https://esm.sh/y-webrtc@10')

    ydoc = new Y.Doc()
    ytext = ydoc.getText('markdown')

    const roomName = 'blank-md-' + location.host + location.pathname.replace(/[^a-z0-9]/gi, '-')
    provider = new WebrtcProvider(roomName, ydoc, {
      signaling: ['wss://signaling.yjs.dev']
    })
    awareness = provider.awareness

    const colors = ['#e85d2a','#3d7a2a','#1e5a8f','#a16207','#9333ea','#dc2626','#0891b2','#c026d3']
    const names = ['Fox','Bear','Owl','Wolf','Deer','Hawk','Lynx','Crow','Elk','Jay']
    awareness.setLocalStateField('user', {
      name: names[Math.floor(Math.random() * names.length)],
      color: colors[Math.floor(Math.random() * colors.length)],
    })

    // Don't insert eagerly — wait for sync to avoid duplication
    const localContent = editorEl.value
    knownValue = localContent
    let seeded = false

    function initContent() {
      if (seeded) return
      const peerContent = ytext.toString()
      if (peerContent) {
        // Peers already have content — adopt it
        seeded = true
        collabReady = true
        editorEl.value = peerContent
        knownValue = peerContent
        updateEditorHighlight()
        refreshDeck()
        renderCollabUsers()
        return
      }
      // No content in ytext — check if other peers exist
      const peerCount = awareness.getStates().size
      if (peerCount > 1) {
        // Other peers exist — only the lowest clientID seeds to avoid duplication
        const ids = [...awareness.getStates().keys()]
        if (ydoc.clientID !== Math.min(...ids)) return // not our job to seed
      }
      // We're the seeder (alone or lowest ID)
      seeded = true
      collabReady = true
      if (localContent) {
        ytext.insert(0, localContent)
        knownValue = localContent
      }
      renderCollabUsers()
    }

    // Observe remote changes to Y.Text
    ytext.observe((event, transaction) => {
      if (transaction.local) return
      // If we haven't seeded yet, this remote update initializes us
      if (!seeded) {
        seeded = true
        collabReady = true
      }
      const selStart = editorEl.selectionStart
      const selEnd = editorEl.selectionEnd
      let adjStart = selStart, adjEnd = selEnd, pos = 0
      for (const op of event.delta) {
        if (op.retain !== undefined) { pos += op.retain }
        else if (op.insert !== undefined) {
          const len = typeof op.insert === 'string' ? op.insert.length : 1
          if (pos <= selStart) adjStart += len
          if (pos <= selEnd) adjEnd += len
          pos += len
        } else if (op.delete !== undefined) {
          if (pos < selStart) adjStart -= Math.min(op.delete, selStart - pos)
          if (pos < selEnd) adjEnd -= Math.min(op.delete, selEnd - pos)
        }
      }
      editorEl.value = ytext.toString()
      knownValue = editorEl.value
      editorEl.selectionStart = Math.max(0, adjStart)
      editorEl.selectionEnd = Math.max(0, adjEnd)
      updateEditorHighlight()
      localStorage.setItem('slidev-md', editorEl.value)
      if (editorOverlay.classList.contains('hidden')) refreshDeck()
      renderRemoteCursors()
    })

    // Track local cursor & broadcast via awareness
    const updateCursor = () => {
      if (!awareness) return
      awareness.setLocalStateField('cursor', {
        anchor: editorEl.selectionStart,
        head: editorEl.selectionEnd,
      })
    }
    editorEl.addEventListener('keyup', updateCursor)
    editorEl.addEventListener('click', updateCursor)
    editorEl.addEventListener('select', updateCursor)

    // Track mouse pointer globally
    document.addEventListener('mousemove', e => {
      if (!awareness) return
      awareness.setLocalStateField('pointer', { x: e.clientX, y: e.clientY })
    })
    document.addEventListener('mouseleave', () => {
      if (!awareness) return
      awareness.setLocalStateField('pointer', null)
    })

    awareness.on('change', () => { renderRemoteCursors(); renderRemotePointers(); renderCollabUsers() })
    editorEl.addEventListener('scroll', renderRemoteCursors)

    // Initialize after sync (or timeout if we're the first peer)
    provider.on('synced', () => setTimeout(initContent, 200))
    setTimeout(initContent, 1000) // fallback: no peers to sync with

    renderCollabUsers()
    console.log('[collab] Room:', roomName)
  } catch (e) {
    console.warn('[collab] Not available:', e.message)
  }
}

// ===== EVENTS =====
function bindEvents() {
  editorEl.addEventListener('input', () => { syncToYText(); updateEditorHighlight() })
  editorEl.addEventListener('scroll', () => {
    editorHighlight.scrollTop = editorEl.scrollTop
    editorHighlight.scrollLeft = editorEl.scrollLeft
  })

  editorEl.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault()
      const s = editorEl.selectionStart, end = editorEl.selectionEnd
      editorEl.value = editorEl.value.substring(0, s) + '  ' + editorEl.value.substring(end)
      editorEl.selectionStart = editorEl.selectionEnd = s + 2
      syncToYText()
      updateEditorHighlight()
    }
  })

  editBtn.onclick = openEditor
  doneBtn.onclick = closeEditor

  let navLock = false
  document.addEventListener('keydown', e => {
    if (!editorOverlay.classList.contains('hidden')) {
      if (e.key === 'Escape') closeEditor()
      return
    }
    if (['ArrowDown', 'ArrowRight', ' ', 'PageDown'].includes(e.key)) {
      e.preventDefault()
      if (!navLock) { navLock = true; next(); setTimeout(() => navLock = false, 400) }
    } else if (['ArrowUp', 'ArrowLeft', 'PageUp'].includes(e.key)) {
      e.preventDefault()
      if (!navLock) { navLock = true; prev(); setTimeout(() => navLock = false, 400) }
    } else if (e.key === 'Home') { e.preventDefault(); goTo(0) }
    else if (e.key === 'End') { e.preventDefault(); goTo(slides.length - 1) }
    else if (e.key === 'e') openEditor()
  })

  let tY
  deck.addEventListener('touchstart', e => { tY = e.touches[0].clientY }, { passive: true })
  deck.addEventListener('touchend', e => {
    const dy = tY - e.changedTouches[0].clientY
    if (Math.abs(dy) > 50) dy > 0 ? next() : prev()
  })
}
</script>

</body>
</html>
