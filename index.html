<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>blank.md</title>
    <!-- prettier-ignore -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root { --editor-width: 50%; --editor-text: #aaa; --editor-bg: #151516; --editor-border: rgb(255 255 255 / 0.08); --line-number: #555; --line-number-active: #fd0; }
      html, body { width: 100%; height: 100%; overflow: hidden; display: flex; font-family: system-ui, sans-serif; background: var(--editor-bg); color: var(--editor-text); }
      #editor { flex: 1; min-width: 0; height: 100%; background: transparent; color: var(--editor-text); border: none; outline: none; resize: none; font: 13px/22px monospace; padding: 16px 16px 16px 72px; tab-size: 2; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; overscroll-behavior: none; }
      #slides { flex: 0 0 var(--editor-width); min-width: 0; height: 100%; overflow-y: auto; scroll-snap-type: y mandatory; border-left: 1px solid var(--editor-border); display: none; }
      .slide { height: 100%; scroll-snap-align: start; overflow: hidden; display: flex; flex-direction: column; justify-content: center; padding: 2rem 3rem; }
      .slide h1, .slide h2, .slide h3 { color: #eee; margin-bottom: 0.5em; }
    </style>
  </head>
  <body>
    <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    <div id="slides"></div>
    <script type="module">
      const editor = document.getElementById("editor")
      const slides = document.getElementById("slides")
      editor.value = localStorage.text || (await fetch("/README.md").then((r) => r.text()))
      editor.addEventListener("input", () => (localStorage.text = editor.value))
      editor.addEventListener("keydown", (e) => {
        if (e.key === "s" && (e.ctrlKey || e.metaKey)) return e.preventDefault()
      })

      // addon
      enrich(editor)
      preview(editor, slides)
      count(editor, slides)
      sync(editor, slides)
      collab(editor)

      // enrich(textarea) — wraps a textarea with line numbers + syntax highlighting, fully self-contained
      function enrich(editor) {
        const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")

        // Inject styles once
        if (!document.getElementById("enrich-css")) {
          const style = document.createElement("style")
          style.id = "enrich-css"
          style.textContent = `
            .enrich { position: relative; overflow: hidden; min-width: 0; height: 100%; }
            .enrich > textarea { position: absolute; inset: 0; width: 100% !important; height: 100% !important; color: transparent; caret-color: #dfdfdf; -webkit-text-fill-color: transparent; z-index: 1; background: transparent; }
            .enrich > .enrich-hl { position: absolute; inset: 0; pointer-events: none; overflow-y: scroll; scrollbar-width: none; padding-bottom: 1lh; }
            .enrich > .enrich-hl::-webkit-scrollbar { display: none; }
            .enrich > .enrich-hl > div { min-height: 1lh; }
            .enrich > .enrich-ln { position: absolute; left: 0; top: 0; bottom: 0; width: 64px; text-align: right; overflow-y: scroll; user-select: none; pointer-events: none; z-index: 2; scrollbar-width: none; background: inherit; padding-bottom: 1lh; }
            .enrich > .enrich-ln::-webkit-scrollbar { display: none; }
            .enrich > .enrich-ln > div.ln-active { color: var(--line-number-active); }
            .enrich > .enrich-ln > div.ln-sep { border-top: 1px solid var(--editor-border); }
            .enrich .h { color: #dfdfdf; font-weight: 700; }
            .enrich .code { color: #4ec99e; }
            .enrich .tick { color: #d49575; }
            .enrich .bold { color: #dfdfdf; font-weight: 700; }
            .enrich .bullet { color: #cf8e8e; }
          `
          document.head.appendChild(style)
        }

        // Read textarea styles before reparenting
        const cs = getComputedStyle(editor)
        const font = cs.font
        const padding = cs.padding
        const paddingTop = cs.paddingTop
        const tabSize = cs.tabSize
        const whiteSpace = cs.whiteSpace
        const wordWrap = cs.wordWrap
        const flex = cs.flex
        const bg = cs.backgroundColor

        // Create wrapper, take textarea's place in layout
        const wrap = document.createElement("div")
        wrap.className = "enrich"
        wrap.style.cssText = `flex:${flex};min-width:0;height:100%;background:${bg}`
        editor.parentNode.insertBefore(wrap, editor)
        wrap.appendChild(editor)

        // Shared style string for text rendering
        const textCSS = `font:${font};padding:${padding};tab-size:${tabSize};white-space:${whiteSpace};word-wrap:${wordWrap};overflow-wrap:break-word;`

        // Highlight overlay
        const hlEl = document.createElement("div")
        hlEl.className = "enrich-hl"
        hlEl.style.cssText = textCSS + `color:var(--editor-text);`
        wrap.insertBefore(hlEl, editor)

        // Line numbers
        const lnEl = document.createElement("div")
        lnEl.className = "enrich-ln"
        lnEl.style.cssText = `font:${font};padding-top:${paddingTop};padding-right:12px;color:var(--line-number);`
        wrap.insertBefore(lnEl, editor)

        function highlight(text) {
          const lines = text.split("\n"),
            out = []
          let i = 0,
            inCode = false
          while (i < lines.length) {
            const raw = lines[i]
            if (raw.startsWith("```")) {
              inCode = !inCode
              out.push(`<div><span class="code">${esc(raw)}</span></div>`)
              i++
              continue
            }
            if (inCode) {
              out.push(`<div><span class="code">${esc(raw)}</span></div>`)
              i++
              continue
            }
            if (/^#{1,6} /.test(raw)) {
              out.push(`<div><span class="h">${esc(raw)}</span></div>`)
              i++
              continue
            }
            out.push(
              "<div>" +
                (esc(raw) || " ")
                  .replace(/(\*\*[^*]+\*\*)/g, '<span class="bold">$1</span>')
                  .replace(/(`[^`]+`)/g, '<span class="tick">$1</span>')
                  .replace(/^([-*+]\s)/, '<span class="bullet">$1</span>') +
                "</div>",
            )
            i++
          }
          return out.join("")
        }

        function update() {
          hlEl.innerHTML = highlight(editor.value)
          linenums()
        }

        function linenums() {
          const secs = [],
            activeIdx = (+location.hash.slice(1) || 1) - 1
          let line = 0
          editor.value.split(/\n\n(?=#{1,6} |\d+\. )/).forEach((chunk, i) => {
            if (i > 0) line += 1
            const start = line
            line += chunk.split("\n").length
            secs.push(start)
          })
          const from = secs[activeIdx] ?? 0
          const to = secs[activeIdx + 1] ?? hlEl.children.length
          let html = ""
          for (let i = 0; i < hlEl.children.length; i++) {
            const cls = (i >= from && i < to ? " ln-active" : "") + (secs.indexOf(i) > 0 ? " ln-sep" : "")
            html += `<div style="height:${hlEl.children[i].getBoundingClientRect().height}px"${cls ? ` class="${cls.trim()}"` : ""}>${i + 1}</div>`
          }
          lnEl.innerHTML = html
        }

        editor.addEventListener("input", update)
        editor.addEventListener("scroll", () => {
          hlEl.scrollTop = editor.scrollTop
          lnEl.scrollTop = editor.scrollTop
        })
        addEventListener("hashchange", linenums)
        update()
      }

      // preview(editor, slides) — renders markdown into slide DOM, parses sections
      function preview(editor, slides) {
        function toHTML(text) {
          return text
            .replace(/^### (.+)$/gm, "<h3>$1</h3>")
            .replace(/^## (.+)$/gm, "<h2>$1</h2>")
            .replace(/^# (.+)$/gm, "<h1>$1</h1>")
            .replace(/^```(\w*)\n([\s\S]*?)^```$/gm, (_, lang, code) => `<pre><code>${code.replace(/</g, "&lt;")}</code></pre>`)
            .replace(/^[-*+] (.+)$/gm, "<li>$1</li>")
            .replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`)
            .replace(/`([^`]+)`/g, "<code>$1</code>")
            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
            .replace(/(?:^|\n)(?!<[huplso])((?:[^\n<].*\n?)+)/g, (_, p) => `<p>${p.trim()}</p>`)
        }

        function render() {
          const text = editor.value
          let line = 0
          const sections = text.split(/\n\n(?=#{1,6} |\d+\. )/).map((chunk, i) => {
            if (i > 0) line += 1
            const start = line
            const lines = chunk.split("\n")
            line += lines.length
            return { start, lines }
          })
          slides.innerHTML = sections.map((s) => `<div class="slide">${toHTML(s.lines.join("\n"))}</div>`).join("")
          slides.sections = sections
        }

        slides.style.display = "block"
        const enrich = editor.closest(".enrich") || editor
        enrich.style.flex = `0 0 var(--editor-width)`
        editor.addEventListener("input", render)
        render()
      }

      // sync(editor, slides) — bidirectional scroll sync between editor and slides, keyboard slide navigation
      function sync(editor, slides) {
        const getHash = () => (+location.hash.slice(1) || 1) - 1

        function goTo(idx, { slide = true, text = true, force = false } = {}) {
          location.hash = idx + 1
          if (slide) {
            skipScroll = true
            slides.children[idx]?.scrollIntoView({ behavior: "instant" })
          }
          if (text && (force || document.activeElement !== editor)) {
            const sec = slides.sections[idx]
            if (!sec) return
            const hl = document.querySelector(".enrich-hl")
            const ln = document.querySelector(".enrich-ln")
            const line = hl?.children[sec.start]
            if (!line) return
            const top = line.getBoundingClientRect().top - hl.getBoundingClientRect().top + hl.scrollTop
            editor.scrollTop = top
            if (hl) hl.scrollTop = top
            if (ln) ln.scrollTop = top
          }
        }

        // editor cursor → hash + slide scroll
        function syncCursor() {
          const pos = editor.value.substring(0, editor.selectionStart).split("\n").length
          const idx = slides.sections.findLastIndex((s) => pos >= s.start + 1)
          goTo(Math.max(0, idx), { text: false })
        }
        editor.addEventListener("click", syncCursor)
        editor.addEventListener("keydown", (e) => {
          if (e.key.startsWith("Arrow") || e.key === "Home" || e.key === "End") setTimeout(syncCursor)
        })

        // slide natural scroll → hash + text scroll (no slide scroll to avoid flicker)
        let skipScroll = false
        slides.addEventListener("scroll", () => {
          if (skipScroll) return (skipScroll = false)
          const idx = Math.round(slides.scrollTop / slides.clientHeight)
          if (getHash() !== idx) goTo(idx, { slide: false, force: true })
        })

        // keyboard slide navigation → hash + both scroll
        document.addEventListener("keydown", (e) => {
          if (document.activeElement?.tagName === "TEXTAREA") return
          const last = slides.children.length - 1
          if (e.key === "Home" || (e.key === "ArrowUp" && (e.metaKey || e.ctrlKey))) return (e.preventDefault(), goTo(0))
          if (e.key === "End" || (e.key === "ArrowDown" && (e.metaKey || e.ctrlKey))) return (e.preventDefault(), goTo(last))
          if (["ArrowDown", "ArrowRight", " ", "PageDown"].includes(e.key)) return (e.preventDefault(), goTo(Math.min(last, getHash() + 1)))
          if (["ArrowUp", "ArrowLeft", "PageUp"].includes(e.key)) return (e.preventDefault(), goTo(Math.max(0, getHash() - 1)))
        })

        goTo(getHash())
      }

      // count(editor, slides) — adds word count, slide count, and slide progress as a single overlay addon
      function count(editor, slides) {
        document.getElementById("count-root")?.remove()

        if (!document.getElementById("count-css")) {
          const style = document.createElement("style")
          style.id = "count-css"
          style.textContent = `
            .count { position: fixed; inset: 0; pointer-events: none; z-index: 4; font: 12px/1 monospace; color: var(--editor-text); }
            .count-box { display: inline-flex; align-items: center; min-height: 28px; padding: 0 10px; background: rgba(21,21,22,0.88); }
            .count-editor,
            .count-slides { position: fixed; bottom: 12px; width: var(--editor-width); padding: 0 12px; display: flex; justify-content: flex-end; }
            .count-editor { left: 0; }
            .count-slides { right: 0; }
            .count-progress { position: fixed; top: 0; left: var(--editor-width); width: var(--editor-width); height: 1px; background: rgba(255,255,255,0.08); overflow: hidden; }
            .count-progress > div { width: 0; height: 100%; background: var(--line-number-active); transition: width 120ms ease-out; }
          `
          document.head.appendChild(style)
        }

        const root = document.createElement("div")
        root.id = "count-root"
        root.className = "count"
        root.innerHTML = `
          <div class="count-editor"><div class="count-box"></div></div>
          <div class="count-slides"><div class="count-box"></div></div>
          <div class="count-progress"><div></div></div>
        `
        document.body.appendChild(root)

        const wordsEl = root.querySelector(".count-editor .count-box")
        const slidesEl = root.querySelector(".count-slides .count-box")
        const progressEl = root.querySelector(".count-progress > div")

        const getWordCount = (text) => (text.match(/\S+/g) || []).length

        function getCurrentSlide(total) {
          if (!slides.clientHeight) return Math.min(total, Math.max(1, +location.hash.slice(1) || 1))
          return Math.min(total, Math.max(1, Math.round(slides.scrollTop / slides.clientHeight) + 1))
        }

        function update() {
          const total = Math.max(1, slides.children.length)
          const current = getCurrentSlide(total)
          const words = getWordCount(editor.value)
          wordsEl.textContent = `${words} word${words === 1 ? "" : "s"}`
          slidesEl.textContent = `${current} / ${total}`
          progressEl.style.width = `${(current / total) * 100}%`
        }

        editor.addEventListener("input", update)
        slides.addEventListener("scroll", update)
        addEventListener("hashchange", update)

        const observer = new MutationObserver(update)
        observer.observe(slides, { childList: true })

        update()
      }

      // collab(editor) — real-time collaboration via Yjs + PartyKit
      function collab(editor) {
        const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;")

        // --- Styles ---
        if (!document.getElementById("collab-css")) {
          const style = document.createElement("style")
          style.id = "collab-css"
          style.textContent = `
            .collab-users { position: fixed; top: 8px; right: 8px; display: flex; align-items: center; gap: 4px; z-index: 5; }
            .collab-dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.3); cursor: pointer; transition: transform 0.1s; }
            .collab-dot:hover { transform: scale(1.5); }
            .collab-dot.following { box-shadow: 0 0 0 2px var(--line-number-active); }
            .collab-count { font: 11px/1 monospace; color: var(--editor-text); margin-left: 2px; }
            .remote-cursor { position: absolute; width: 2px; pointer-events: none; z-index: 3; border-radius: 1px; }
            .remote-cursor-label { position: absolute; top: -18px; left: -1px; color: #fff; font: 600 10px/14px monospace; padding: 1px 6px; border-radius: 3px 3px 3px 0; white-space: nowrap; }
            .remote-selection { position: absolute; pointer-events: none; z-index: 2; opacity: 0.25; }
            .remote-pointer { position: fixed; pointer-events: none; z-index: 9999; width: 0; height: 0; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.05)) drop-shadow(0 8px 26px rgba(0,0,0,0.06)); isolation: isolate; transition: left 60ms ease-out, top 60ms ease-out; }
            .remote-pointer svg { width: 16px; height: 16px; position: absolute; top: 0; left: 0; }
            .remote-pointer-bubble { position: absolute; top: 13px; left: 13px; background: currentColor; border-radius: 9999px; padding: 5px 9px; font: 500 13px/1 system-ui, sans-serif; white-space: nowrap; }
            .remote-pointer-label { opacity: 0.95; filter: invert() grayscale() brightness(1.3) contrast(9000); mix-blend-mode: luminosity; }
            @supports (color: oklch(from black l c h)) { .remote-pointer-label { opacity: 1; filter: none; mix-blend-mode: normal; color: oklch(from var(--c) clamp(0, (l / .623 - 1) * -infinity, 1) 0 h) !important; } }
          `
          document.head.appendChild(style)
        }

        // --- DOM ---
        const usersEl = document.createElement("div")
        usersEl.className = "collab-users"
        document.body.appendChild(usersEl)

        const cursorsEl = document.createElement("div")
        cursorsEl.style.cssText = "position:absolute;inset:0;pointer-events:none;z-index:3;overflow:hidden;"
        ;(editor.closest(".enrich") || editor.parentNode).appendChild(cursorsEl)

        const pointersEl = document.createElement("div")
        document.body.appendChild(pointersEl)

        // --- Identity ---
        const identities = [
          { name: "Yellow", color: "#fd0" },
          { name: "Pink", color: "#f6e" },
          { name: "Red", color: "#f34" },
          { name: "Orange", color: "#fa3" },
          { name: "Green", color: "#7d0" },
          { name: "Blue", color: "#39f" },
          { name: "Cyan", color: "#3df" },
        ]
        let user = { name: localStorage.getItem("collab-name"), color: localStorage.getItem("collab-color") }
        if (!user.name || !identities.find((i) => i.name === user.name)) {
          user = identities[Math.floor(Math.random() * identities.length)]
          localStorage.setItem("collab-name", user.name)
          localStorage.setItem("collab-color", user.color)
        }

        // --- State ---
        let Y, ydoc, ytext, awareness
        let knownValue = editor.value
        let ready = false
        let followId = null

        // --- Diff: simple prefix/suffix match ---
        function syncToY() {
          if (!ytext || !ready) return
          const newVal = editor.value
          if (newVal === knownValue) return
          let start = 0
          while (start < knownValue.length && start < newVal.length && knownValue[start] === newVal[start]) start++
          let endOld = knownValue.length,
            endNew = newVal.length
          while (endOld > start && endNew > start && knownValue[endOld - 1] === newVal[endNew - 1]) {
            endOld--
            endNew--
          }
          ydoc.transact(() => {
            if (endOld > start) ytext.delete(start, endOld - start)
            if (endNew > start) ytext.insert(start, newVal.slice(start, endNew))
          })
          knownValue = newVal
        }

        // --- Caret coordinates (mirror div technique) ---
        let caretDiv, caretMarker
        function getCaretCoords(pos) {
          if (!caretDiv) {
            caretDiv = document.createElement("div")
            caretDiv.style.cssText = "position:absolute;visibility:hidden;white-space:pre-wrap;word-wrap:break-word;overflow:hidden;"
            caretMarker = document.createElement("span")
            caretMarker.textContent = "\u200b"
            document.body.appendChild(caretDiv)
          }
          const cs = getComputedStyle(editor)
          for (const p of ["font", "padding", "tabSize", "borderWidth"]) caretDiv.style[p] = cs[p]
          caretDiv.style.width = editor.clientWidth + "px"
          caretDiv.textContent = editor.value.substring(0, pos)
          caretDiv.appendChild(caretMarker)
          const lineH = parseFloat(cs.lineHeight) || parseFloat(cs.fontSize) * 1.7
          return { top: caretMarker.offsetTop - 4, left: caretMarker.offsetLeft, height: lineH, selHeight: lineH }
        }

        // --- Render remote cursors & selections ---
        function renderCursors() {
          if (!awareness || !Y) return
          const states = awareness.getStates()
          const resolve = (rel) => Y.createAbsolutePositionFromRelativePosition(JSON.parse(rel), ydoc)
          let html = ""
          for (const [id, state] of states) {
            if (id === awareness.clientID || !state.user || !state.cursor) continue
            const { name, color } = state.user
            const head = resolve(state.cursor.head)
            if (!head) continue
            const c = getCaretCoords(head.index)
            const top = c.top - editor.scrollTop
            html += `<div class="remote-cursor" style="left:${c.left}px;top:${top}px;height:${c.height}px;background:${color}"><div class="remote-cursor-label" style="background:${color}">${esc(name)}</div></div>`
            const anchor = resolve(state.cursor.anchor)
            if (anchor && anchor.index !== head.index) {
              const from = Math.min(anchor.index, head.index),
                to = Math.max(anchor.index, head.index)
              const fc = getCaretCoords(from),
                tc = getCaretCoords(to)
              const padL = parseFloat(getComputedStyle(editor).paddingLeft) || 0
              if (fc.top === tc.top) {
                html += `<div class="remote-selection" style="left:${fc.left}px;top:${fc.top - editor.scrollTop}px;width:${tc.left - fc.left}px;height:${fc.selHeight}px;background:${color}"></div>`
              } else {
                for (let y = fc.top; y <= tc.top; y += fc.height) {
                  const lx = y === fc.top ? fc.left : padL,
                    rx = y === tc.top ? tc.left : editor.clientWidth
                  html += `<div class="remote-selection" style="left:${lx}px;top:${y - editor.scrollTop}px;width:${rx - lx}px;height:${fc.selHeight}px;background:${color}"></div>`
                }
              }
            }
          }
          cursorsEl.innerHTML = html
          // Follow mode: scroll to followed user's cursor
          if (followId === null) return
          const state = states.get(followId)
          const head = state?.cursor ? resolve(state.cursor.head) : null
          if (!head) return
          if (slides.sections) {
            const line = editor.value.substring(0, head.index).split("\n").length
            const idx = slides.sections.findLastIndex((s) => line >= s.start + 1)
            if (idx >= 0) location.hash = idx + 1
          }
          const c = getCaretCoords(head.index)
          if (c.top < editor.scrollTop || c.top > editor.scrollTop + editor.clientHeight - c.height) {
            const scrollTo = c.top - editor.clientHeight / 2
            editor.scrollTop = scrollTo
            const hl = document.querySelector(".enrich-hl"),
              ln = document.querySelector(".enrich-ln")
            if (hl) hl.scrollTop = scrollTo
            if (ln) ln.scrollTop = scrollTo
          }
        }

        // --- Render remote mouse pointers ---
        function renderPointers() {
          if (!awareness) return
          let html = ""
          for (const [id, state] of awareness.getStates()) {
            if (id === awareness.clientID || !state.user || !state.pointer) continue
            const { name, color } = state.user
            const x = state.pointer.rx * innerWidth,
              y = state.pointer.ry * innerHeight
            html += `<div class="remote-pointer" style="left:${x}px;top:${y}px;color:${color}"><svg viewBox="0 0 32 32"><path fill="currentColor" d="m.088 1.75 11.25 29.422c.409 1.07 1.908 1.113 2.377.067l5.223-11.653c.13-.288.36-.518.648-.648l11.653-5.223c1.046-.47 1.004-1.968-.067-2.377L1.75.088C.71-.31-.31.71.088 1.75Z"/></svg><div class="remote-pointer-bubble"><span class="remote-pointer-label" style="--c:${color};color:${color}">${esc(name)}</span></div></div>`
          }
          pointersEl.innerHTML = html
        }

        // --- Render user dots ---
        function renderUsers() {
          if (!awareness) return
          const states = awareness.getStates()
          let html = ""
          for (const [id, state] of states) {
            if (!state.user) continue
            const isLocal = id === awareness.clientID
            html += `<span class="collab-dot${id === followId ? " following" : ""}" style="background:${state.user.color}" title="${esc(state.user.name)}${isLocal ? " (you)" : ""}"${isLocal ? "" : ` data-id="${id}"`}></span>`
          }
          if (states.size > 1) html += `<span class="collab-count">${states.size}</span>`
          usersEl.innerHTML = html
        }

        // --- Follow mode ---
        usersEl.addEventListener("click", (e) => {
          const dot = e.target.closest("[data-id]")
          if (!dot) return
          const id = +dot.dataset.id
          followId = followId === id ? null : id
          renderUsers()
          renderCursors()
        })
        const stopFollow = () => {
          if (followId !== null) {
            followId = null
            renderUsers()
          }
        }
        editor.addEventListener("keydown", stopFollow)
        editor.addEventListener("click", stopFollow)

        // --- Yjs setup ---
        async function setup() {
          try {
            Y = await import("https://esm.sh/yjs@13")
            const { default: YPartyKitProvider } = await import("https://esm.sh/y-partykit@0/provider")

            ydoc = new Y.Doc()
            ytext = ydoc.getText("markdown")
            const room = "blank-md-" + location.host + location.pathname.replace(/[^a-z0-9]/gi, "-")
            const provider = new YPartyKitProvider("blank-md.vbrajon.partykit.dev", room, ydoc)
            awareness = provider.awareness
            awareness.setLocalStateField("user", user)

            // Seed content: use peer content if available, else local content (lowest clientID wins)
            const localContent = editor.value
            let seeded = false
            function initContent() {
              if (seeded) return
              const peerContent = ytext.toString()
              if (peerContent) {
                seeded = ready = true
                editor.value = knownValue = peerContent
                editor.dispatchEvent(new Event("input"))
                return renderUsers()
              }
              if (awareness.getStates().size > 1 && ydoc.clientID !== Math.min(...awareness.getStates().keys())) return
              seeded = ready = true
              if (localContent) {
                ytext.insert(0, localContent)
                knownValue = localContent
              }
              renderUsers()
            }

            // Preserve cursor position across remote edits
            let relStart, relEnd
            ydoc.on("beforeTransaction", () => {
              if (!ytext?.length) return
              relStart = Y.createRelativePositionFromTypeIndex(ytext, Math.min(editor.selectionStart, ytext.length))
              relEnd = Y.createRelativePositionFromTypeIndex(ytext, Math.min(editor.selectionEnd, ytext.length))
            })

            // Apply remote changes to editor
            ytext.observe((_, tx) => {
              if (tx.local) return
              if (!seeded) seeded = ready = true
              editor.value = knownValue = ytext.toString()
              if (relStart) {
                const a = Y.createAbsolutePositionFromRelativePosition(relStart, ydoc)
                if (a) editor.selectionStart = a.index
              }
              if (relEnd) {
                const a = Y.createAbsolutePositionFromRelativePosition(relEnd, ydoc)
                if (a) editor.selectionEnd = a.index
              }
              editor.dispatchEvent(new Event("input"))
              renderCursors()
            })

            // Broadcast cursor + pointer
            document.addEventListener("selectionchange", () => {
              if (!ytext || document.activeElement !== editor) return
              awareness.setLocalStateField("cursor", {
                anchor: JSON.stringify(Y.createRelativePositionFromTypeIndex(ytext, editor.selectionStart)),
                head: JSON.stringify(Y.createRelativePositionFromTypeIndex(ytext, editor.selectionEnd)),
              })
            })
            document.addEventListener("mousemove", (e) => awareness.setLocalStateField("pointer", { rx: e.clientX / innerWidth, ry: e.clientY / innerHeight }))
            document.addEventListener("mouseleave", () => awareness.setLocalStateField("pointer", null))

            // Re-render on any awareness change
            awareness.on("change", () => {
              renderCursors()
              renderPointers()
              renderUsers()
            })
            editor.addEventListener("scroll", renderCursors)

            provider.on("sync", () => setTimeout(initContent, 200))
            provider.on("synced", () => setTimeout(initContent, 200))
            setTimeout(initContent, 1000)
            renderUsers()
            console.log("[collab] Room:", room)
          } catch (e) {
            console.warn("[collab] Not available:", e.message)
          }
        }

        editor.addEventListener("input", syncToY)
        setup()
      }
    </script>
  </body>
</html>
